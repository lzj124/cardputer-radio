; Cardputer Radio — Internet Radio Streamer for M5Stack Cardputer
; Uses Radio Browser API for station discovery, ESP32-audioI2S for streaming
;
; Build & flash:
;   export WIFI_SSID="your-wifi" WIFI_PASS="your-password"
;   ~/Library/Python/3.9/bin/pio run -t upload
;
; Or set defaults in src/config.h and just:
;   ~/Library/Python/3.9/bin/pio run -t upload

[platformio]
default_envs = m5stack-cardputer

[env:m5stack-cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
lib_deps =
    m5stack/M5Cardputer@^1.0.2
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#63fd045c243df7e59ed84c2cadb69f06f305ae8a
platform_packages =
    espressif/toolchain-riscv32-esp @ 8.4.0+2021r2-patch5
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCONFIG_TCP_WND=65536
    -DCONFIG_TCP_SND_BUF=65536
    -DCONFIG_TCP_RCV_BUF=65536
monitor_speed = 115200
upload_speed = 115200
extra_scripts = pre:scripts/pre_upload.py
